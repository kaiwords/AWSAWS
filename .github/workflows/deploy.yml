name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'fullstack-learning-app/**'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync files to S3
        run: |
          aws s3 sync fullstack-learning-app/ s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Set index.html as website home document
        run: |
          aws s3 website s3://${{ secrets.S3_BUCKET_NAME }}/ \
            --index-document index.html \
            --error-document index.html

      # Uncomment if you have a CloudFront distribution in front of S3
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
      #       --paths "/*"

      - name: Print site URL
        run: |
          echo "Site URL: http://${{ secrets.S3_BUCKET_NAME }}.s3-website-${{ secrets.AWS_REGION }}.amazonaws.com"
