name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'fullstack-learning-app/**'
      - 'infra/**'
  workflow_dispatch:

jobs:
  infra-and-deploy:
    name: Deploy CDK Infrastructure and App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap
        working-directory: infra
        run: npx cdk bootstrap

      # --outputs-file writes all CfnOutputs to a JSON file immediately
      # after deploy. No extra API calls needed to find the bucket name.
      - name: CDK Deploy
        working-directory: infra
        run: |
          npx cdk deploy --require-approval never \
            --outputs-file ../cdk-outputs.json

      - name: Read bucket name from CDK outputs
        run: |
          # cdk-outputs.json looks like:
          # { "FullstackLearningStack": { "BucketName": "...", "WebsiteURL": "..." } }
          BUCKET_NAME=$(jq -r '.FullstackLearningStack.BucketName' cdk-outputs.json)
          WEBSITE_URL=$(jq -r '.FullstackLearningStack.WebsiteURL' cdk-outputs.json)

          if [ -z "$BUCKET_NAME" ] || [ "$BUCKET_NAME" = "null" ]; then
            echo "❌ BucketName not found in cdk-outputs.json"
            echo "Contents of cdk-outputs.json:"
            cat cdk-outputs.json
            exit 1
          fi

          echo "✅ Bucket name: $BUCKET_NAME"
          echo "BUCKET_NAME=$BUCKET_NAME" >> "$GITHUB_ENV"
          echo "WEBSITE_URL=$WEBSITE_URL"  >> "$GITHUB_ENV"

      - name: Sync app files to S3
        run: |
          aws s3 sync fullstack-learning-app/ "s3://$BUCKET_NAME/" \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate"

      # Uncomment once you add a CloudFront distribution to the CDK stack
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
      #       --paths "/*"

      - name: Print site URL
        run: echo "✅ Live at $WEBSITE_URL"
