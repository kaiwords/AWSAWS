name: Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - 'fullstack-learning-app/**'
      - 'infra/**'
  workflow_dispatch:

jobs:
  infra-and-deploy:
    name: Deploy CDK Infrastructure and App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap
        working-directory: infra
        run: npx cdk bootstrap

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never

      # Derive the bucket name the same way the CDK stack does:
      # bucketName: `fullstack-learning-app-${account}-${region}`
      # Using STS avoids any cross-job output passing issues.
      - name: Resolve bucket name
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity \
            --query Account --output text)
          REGION="${{ secrets.AWS_REGION }}"
          BUCKET_NAME="fullstack-learning-app-${ACCOUNT_ID}-${REGION}"

          echo "BUCKET_NAME=${BUCKET_NAME}" >> "$GITHUB_ENV"
          echo "✅ Bucket: ${BUCKET_NAME}"

      - name: Sync app files to S3
        run: |
          aws s3 sync fullstack-learning-app/ "s3://${BUCKET_NAME}/" \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate"

      # Uncomment once you add a CloudFront distribution to the CDK stack
      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
      #       --paths "/*"

      - name: Print site URL
        run: |
          REGION="${{ secrets.AWS_REGION }}"
          echo "✅ Live at: http://${BUCKET_NAME}.s3-website-${REGION}.amazonaws.com"
