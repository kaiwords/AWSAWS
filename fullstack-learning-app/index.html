<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FullStack Learning Path</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#242736; --border:#2e3347;
    --accent:#6c63ff; --accent2:#ff6584; --green:#22c55e; --yellow:#f59e0b;
    --blue:#3b82f6; --text:#e2e8f0; --text-muted:#8892a4; --radius:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;height:100vh;overflow:hidden;}

  /* SIDEBAR */
  #sidebar{width:280px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:width .25s,min-width .25s;overflow:hidden;}
  #sidebar.collapsed{width:0;min-width:0;}
  #sidebar-header{padding:16px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;}
  #sidebar-header h1{font-size:1rem;color:var(--accent);flex:1;}
  #sidebar-header p{font-size:.7rem;color:var(--text-muted);}
  #progress-wrap{padding:10px 16px;border-bottom:1px solid var(--border);}
  #progress-label{font-size:.7rem;color:var(--text-muted);margin-bottom:5px;display:flex;justify-content:space-between;}
  #progress-bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;}
  #progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s;}
  #search-wrap{padding:8px 12px;border-bottom:1px solid var(--border);}
  #search-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:.8rem;outline:none;}
  #search-input:focus{border-color:var(--accent);}
  #phase-list{flex:1;overflow-y:auto;padding:6px 0;}
  .phase-group{margin-bottom:2px;}
  .phase-btn{width:100%;text-align:left;background:none;border:none;color:var(--text-muted);padding:7px 14px;cursor:pointer;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center;transition:color .2s;}
  .phase-btn:hover{color:var(--text);}
  .phase-btn .chevron{transition:transform .2s;}
  .phase-btn.open .chevron{transform:rotate(90deg);}
  .topic-list{display:none;}
  .topic-list.open{display:block;}
  .topic-btn{width:100%;text-align:left;background:none;border:none;color:var(--text-muted);padding:6px 14px 6px 26px;cursor:pointer;font-size:.81rem;display:flex;align-items:center;gap:7px;transition:all .15s;border-right:2px solid transparent;}
  .topic-btn:hover{color:var(--text);background:var(--surface2);}
  .topic-btn.active{color:var(--accent);background:rgba(108,99,255,.1);border-right-color:var(--accent);}
  .check{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;}
  .check.filled{background:var(--green);border-color:var(--green);color:#fff;}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  #topbar{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0;}
  #toggle-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:5px 9px;border-radius:6px;cursor:pointer;font-size:.9rem;transition:all .15s;flex-shrink:0;}
  #toggle-btn:hover{border-color:var(--accent);color:var(--accent);}
  #topbar h2{font-size:.95rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tag{font-size:.68rem;padding:2px 9px;border-radius:99px;font-weight:600;white-space:nowrap;}
  .tag-phase{background:rgba(108,99,255,.2);color:var(--accent);}
  .nav-btns{display:flex;gap:6px;flex-shrink:0;}
  .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.75rem;transition:all .15s;}
  .nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .nav-btn:disabled{opacity:.3;cursor:default;}
  .btn-mark{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:.78rem;font-weight:600;transition:opacity .2s;flex-shrink:0;}
  .btn-mark:hover{opacity:.85;}
  .btn-mark.done{background:var(--green);}

  #content{flex:1;overflow-y:auto;padding:20px;}

  /* TABS */
  .tabs{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap;}
  .tab-btn{background:none;border:none;color:var(--text-muted);padding:7px 14px;cursor:pointer;font-size:.81rem;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .card h3{font-size:.88rem;margin-bottom:9px;color:var(--text);}
  .card p,.card li{font-size:.82rem;color:var(--text-muted);line-height:1.65;}
  .card ul,.card ol{padding-left:16px;}
  .card li{margin-bottom:4px;}
  .card code{background:var(--surface2);padding:2px 5px;border-radius:4px;font-family:'Consolas',monospace;font-size:.78rem;color:#a78bfa;}

  /* CODE BLOCK */
  .code-block{background:#0d1117;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin:10px 0;overflow-x:auto;position:relative;}
  .code-block pre{font-family:'Consolas','Monaco',monospace;font-size:.78rem;line-height:1.6;color:#e2e8f0;}
  .code-lang{position:absolute;top:7px;right:10px;font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}

  /* PROJECTS */
  .project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;transition:border-color .2s;}
  .project-card:hover{border-color:var(--accent);}
  .project-card h4{font-size:.87rem;margin-bottom:5px;}
  .project-card p{font-size:.79rem;color:var(--text-muted);line-height:1.55;}
  .difficulty{display:inline-block;font-size:.66rem;padding:2px 7px;border-radius:99px;font-weight:700;margin-right:5px;}
  .beginner{background:rgba(34,197,94,.15);color:var(--green);}
  .intermediate{background:rgba(245,158,11,.15);color:var(--yellow);}
  .advanced{background:rgba(239,68,68,.15);color:#ef4444;}
  .tech-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
  .tech-tag{font-size:.66rem;padding:2px 7px;background:var(--surface2);border-radius:99px;color:var(--text-muted);}

  /* Q&A */
  .qa-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
  .qa-q{padding:11px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;background:var(--surface);transition:background .15s;gap:10px;}
  .qa-q:hover{background:var(--surface2);}
  .qa-q span{font-size:.82rem;font-weight:600;line-height:1.4;}
  .qa-q .arr{color:var(--accent);flex-shrink:0;transition:transform .2s;font-size:.85rem;margin-top:2px;}
  .qa-q.open .arr{transform:rotate(90deg);}
  .qa-a{display:none;padding:12px 14px;background:var(--surface2);border-top:1px solid var(--border);}
  .qa-a p,.qa-a li{font-size:.8rem;color:var(--text-muted);line-height:1.65;}
  .qa-a ul{padding-left:14px;}
  .qa-a li{margin-bottom:3px;}

  /* BEST PRACTICES */
  .practice-item{display:flex;gap:10px;padding:11px;background:var(--surface2);border-radius:var(--radius);margin-bottom:7px;}
  .practice-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
  .practice-text h4{font-size:.82rem;font-weight:600;margin-bottom:2px;}
  .practice-text p{font-size:.77rem;color:var(--text-muted);line-height:1.55;}

  /* NOTES */
  #notes-area{width:100%;min-height:180px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;color:var(--text);font-size:.83rem;line-height:1.6;resize:vertical;outline:none;font-family:inherit;}
  #notes-area:focus{border-color:var(--accent);}
  #notes-save-msg{font-size:.72rem;color:var(--green);margin-top:6px;height:16px;transition:opacity .3s;}

  /* QUIZ */
  .quiz-q{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
  .quiz-q p{font-size:.84rem;font-weight:600;margin-bottom:10px;line-height:1.4;}
  .quiz-opts{display:flex;flex-direction:column;gap:6px;}
  .quiz-opt{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;cursor:pointer;font-size:.81rem;color:var(--text-muted);text-align:left;transition:all .15s;}
  .quiz-opt:hover:not(.locked){border-color:var(--accent);color:var(--text);}
  .quiz-opt.correct{background:rgba(34,197,94,.15);border-color:var(--green);color:var(--green);}
  .quiz-opt.wrong{background:rgba(239,68,68,.1);border-color:#ef4444;color:#ef4444;}
  .quiz-opt.locked{cursor:default;}
  .quiz-result{margin-top:16px;padding:14px;background:var(--surface2);border-radius:var(--radius);text-align:center;}
  .quiz-result p{font-size:.88rem;font-weight:600;}
  .quiz-result span{font-size:1.3rem;}
  .btn-retake{background:var(--accent);color:#fff;border:none;padding:7px 18px;border-radius:var(--radius);cursor:pointer;font-size:.8rem;font-weight:600;margin-top:10px;}

  /* HOME */
  .hero{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(255,101,132,.1));border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;}
  .hero h2{font-size:1.4rem;margin-bottom:6px;}
  .hero p{color:var(--text-muted);font-size:.86rem;line-height:1.6;max-width:560px;}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
  .stat-num{font-size:1.5rem;font-weight:700;color:var(--accent);}
  .stat-label{font-size:.7rem;color:var(--text-muted);margin-top:2px;}
  .phase-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
  .phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;}
  .phase-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .phase-card-icon{font-size:1.3rem;margin-bottom:7px;}
  .phase-card h3{font-size:.85rem;margin-bottom:4px;}
  .phase-card p{font-size:.73rem;color:var(--text-muted);line-height:1.5;}
  .phase-progress{height:3px;background:var(--surface2);border-radius:99px;margin-top:9px;overflow:hidden;}
  .phase-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s;}

  /* SEARCH RESULTS */
  .search-result-item{width:100%;text-align:left;background:none;border:none;color:var(--text-muted);padding:6px 14px;cursor:pointer;font-size:.8rem;display:block;transition:all .15s;}
  .search-result-item:hover{color:var(--text);background:var(--surface2);}
  .search-result-item span{font-size:.68rem;color:var(--accent);display:block;}

  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--accent);}

  @media(max-width:700px){
    #sidebar{width:240px;min-width:240px;}
    .stats-row{grid-template-columns:repeat(2,1fr);}
    #topbar h2{font-size:.82rem;}
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header" onclick="loadHome()">
    <h1>⚡ FullStack Path</h1>
  </div>
  <div id="progress-wrap">
    <div id="progress-label"><span>Progress</span><span id="progress-text">0/0</span></div>
    <div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="Search topics..." oninput="handleSearch(this.value)">
  </div>
  <div id="phase-list"></div>
</nav>

<div id="main">
  <div id="topbar">
    <button id="toggle-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <h2 id="topic-title">FullStack Learning Path</h2>
    <span id="topic-tag" class="tag tag-phase">Overview</span>
    <div class="nav-btns">
      <button class="nav-btn" id="prev-btn" onclick="navigateTopic(-1)" disabled>← Prev</button>
      <button class="nav-btn" id="next-btn" onclick="navigateTopic(1)" disabled>Next →</button>
    </div>
    <button id="mark-btn" class="btn-mark" onclick="markTopic()" style="display:none">Mark Complete</button>
  </div>
  <div id="content">
    <div id="home-view"></div>
    <div id="topic-view" style="display:none"></div>
  </div>
</div>

<script>
// ===================== DATA =====================
const ROADMAP = [
  {
    id:"phase1", label:"Phase 1: Internet & HTML", icon:"🌐",
    desc:"How the web works, HTTP, and semantic HTML.",
    topics:[
      {
        id:"how-internet", title:"How the Internet Works",
        overview:"The internet is a global network of interconnected computers communicating via standardized protocols (TCP/IP). When you visit a website, your browser sends an HTTP request to a DNS-resolved IP address, the server processes it and returns a response.",
        keyConcepts:["IP Addresses & MAC Addresses","TCP/IP Protocol Suite","DNS (Domain Name System)","HTTP vs HTTPS","Client-Server Model","Request-Response Cycle","Ports & Sockets"],
        bestPractices:[
          {icon:"🔒",title:"Always use HTTPS",desc:"Encrypt all data in transit. Never send sensitive data over plain HTTP."},
          {icon:"⚡",title:"Minimize DNS lookups",desc:"Reduce unique domains your page loads assets from to cut DNS overhead."},
          {icon:"📡",title:"Use CDNs",desc:"Serve static assets from Content Delivery Networks to reduce latency globally."},
        ],
        projects:[
          {title:"HTTP Inspector Tool",diff:"beginner",desc:"Build a UI that lets you enter a URL and displays the HTTP response: status code, headers, and timing.",techs:["HTML","CSS","JS"]},
          {title:"DNS Lookup Visualizer",diff:"intermediate",desc:"Build a Node.js tool that resolves a domain and shows the full DNS chain: resolver → root → TLD → authoritative.",techs:["Node.js","dns module"]},
        ],
        qa:[
          {q:"What is the difference between TCP and UDP?",a:"TCP (Transmission Control Protocol) is connection-oriented: provides guaranteed delivery, ordering, and error checking via the 3-way handshake. UDP (User Datagram Protocol) is connectionless: faster but no delivery guarantee. TCP is used for web, email; UDP for streaming, gaming, and DNS queries."},
          {q:"What happens when you type a URL in the browser?",a:"1. Browser checks cache. 2. DNS resolution (browser → OS → resolver → root → TLD → authoritative nameserver). 3. TCP connection (3-way handshake). 4. TLS handshake (for HTTPS). 5. HTTP request sent. 6. Server processes request. 7. Response returned. 8. Browser renders HTML, then fetches CSS/JS/images."},
          {q:"What is the difference between HTTP and HTTPS?",a:"HTTPS = HTTP + TLS/SSL encryption. HTTPS ensures: Confidentiality (data is encrypted), Integrity (data is not tampered in transit), Authentication (the certificate proves you're talking to the right server). Port 80 for HTTP, 443 for HTTPS."},
          {q:"What are HTTP status code categories?",a:"1xx: Informational. 2xx: Success (200 OK, 201 Created, 204 No Content). 3xx: Redirection (301 Moved Permanently, 304 Not Modified). 4xx: Client errors (400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found, 429 Too Many Requests). 5xx: Server errors (500 Internal Server Error, 503 Service Unavailable)."},
        ],
        quiz:[
          {q:"Which protocol guarantees packet delivery and ordering?",opts:["UDP","TCP","HTTP","DNS"],answer:1},
          {q:"What port does HTTPS use by default?",opts:["80","8080","443","3000"],answer:2},
          {q:"Which status code means 'resource not found'?",opts:["403","500","301","404"],answer:3},
        ],
        code:`// Demonstrating HTTP request lifecycle
fetch('https://api.example.com/data', {
  method: 'GET',
  headers: {
    'Accept': 'application/json',
    'Authorization': 'Bearer your-token'
  }
})
.then(res => {
  console.log('Status:', res.status);   // 200, 404, 500...
  return res.json();
})
.then(data => console.log('Data:', data))
.catch(err => console.error('Network error:', err));`
      },
      {
        id:"html-basics", title:"HTML Fundamentals",
        overview:"HTML (HyperText Markup Language) is the skeleton of every webpage. Semantic HTML improves accessibility, SEO, and maintainability. Writing good HTML is the foundation of frontend development.",
        keyConcepts:["Semantic Elements (nav, main, article, section, aside)","Forms & native validation","Tables & Lists","Media (img, video, audio)","Accessibility: ARIA roles & alt text","Meta tags & SEO","HTML5 APIs (localStorage, Canvas, Geolocation)"],
        bestPractices:[
          {icon:"♿",title:"Use semantic HTML",desc:"Use <header>, <nav>, <main>, <article>, <footer> instead of generic <div>. Aids screen readers and SEO."},
          {icon:"🖼️",title:"Always add alt text",desc:"Every <img> must have a descriptive alt attribute for accessibility and SEO."},
          {icon:"📱",title:"Mobile-first meta tag",desc:'Always include <meta name="viewport" content="width=device-width, initial-scale=1.0"> for responsive design.'},
        ],
        projects:[
          {title:"Personal Portfolio Page",diff:"beginner",desc:"Build a semantic, accessible personal portfolio: about, skills, projects, and a contact form with native validation.",techs:["HTML5","CSS3"]},
          {title:"Multi-step Form",diff:"beginner",desc:"Build a multi-step registration form with HTML5 validation, custom error messages, and ARIA accessibility.",techs:["HTML5","JS"]},
        ],
        qa:[
          {q:"What is semantic HTML and why does it matter?",a:"Semantic HTML uses meaningful tags that describe the content's purpose (e.g., <nav> for navigation, <article> for standalone content). It matters for: SEO (search engines understand content better), Accessibility (screen readers navigate by landmarks), Maintainability (code is self-documenting)."},
          {q:"What is the difference between <div> and <section>?",a:"<div> is a generic container with no semantic meaning. <section> represents a standalone section of content that would appear in a document outline. Use <section> when the content has a heading; use <div> for styling/layout purposes only."},
          {q:"Explain the difference between GET and POST form methods.",a:"GET appends data to the URL (visible, bookmarkable, cached, limited size ~2KB). POST sends data in the request body (hidden, not cached, no size limit). Use GET for searches/filters, POST for sensitive data or large payloads."},
          {q:"What are data attributes in HTML5?",a:"Data attributes (data-*) store custom data in HTML elements: <div data-user-id='123'>. Access via JS: element.dataset.userId. Useful for passing server-rendered data to JavaScript without polluting the DOM or using non-standard attributes."},
        ],
        quiz:[
          {q:"Which element is correct for a site's primary navigation?",opts:["<div class='nav'>","<nav>","<menu>","<header>"],answer:1},
          {q:"What attribute makes an image accessible?",opts:["title","src","alt","aria-label"],answer:2},
          {q:"Which HTML5 element represents standalone content (e.g., a blog post)?",opts:["<section>","<div>","<article>","<aside>"],answer:2},
        ],
        code:`<!-- Semantic HTML5 Structure -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page description for SEO">
  <title>Page Title</title>
</head>
<body>
  <header>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <article>
      <h1>Main Heading</h1>
      <section aria-labelledby="sec-title">
        <h2 id="sec-title">Section Title</h2>
        <p>Content here...</p>
        <img src="photo.jpg" alt="Descriptive alt text" loading="lazy">
      </section>
    </article>
    <aside>Related content</aside>
  </main>
  <footer>Copyright info</footer>
</body>
</html>`
      },
    ]
  },
  {
    id:"phase2", label:"Phase 2: CSS & Styling", icon:"🎨",
    desc:"Layouts, animations, and responsive design.",
    topics:[
      {
        id:"css-layouts", title:"CSS Layouts: Flexbox & Grid",
        overview:"Flexbox handles one-dimensional layouts (rows OR columns). CSS Grid handles two-dimensional layouts (rows AND columns). Master both to build any layout without hacks.",
        keyConcepts:["Flexbox: container & item properties","CSS Grid: template areas, fr units","Responsive Design & Media Queries","CSS Variables (Custom Properties)","BEM Naming Convention","CSS Animations & Transitions","Box Model & box-sizing"],
        bestPractices:[
          {icon:"📐",title:"Mobile-first approach",desc:"Write base styles for mobile, then use min-width media queries to enhance for larger screens."},
          {icon:"🎨",title:"Use CSS custom properties",desc:"Define colors, spacing, fonts as CSS variables in :root for easy theming and consistency."},
          {icon:"🚀",title:"Prefer transform for animations",desc:"Use transform and opacity for animations — they run on the GPU and don't trigger layout reflow."},
        ],
        projects:[
          {title:"Responsive Dashboard Layout",diff:"beginner",desc:"Build a responsive admin dashboard with sidebar, topbar, and card grid using CSS Grid and Flexbox.",techs:["HTML","CSS Grid","Flexbox"]},
          {title:"CSS-only Components",diff:"intermediate",desc:"Create a pure-CSS animated loading spinner, tooltip, accordion, and dropdown menu without JavaScript.",techs:["CSS3","Animations"]},
        ],
        qa:[
          {q:"When would you use Flexbox vs CSS Grid?",a:"Flexbox: 1D layouts — navbars, centering, button groups, cards in a row. Grid: 2D layouts — full page structure, magazine layouts, dashboard grids. Rule of thumb: if you're thinking rows AND columns simultaneously, use Grid. If laying things out in one direction, use Flexbox. They complement each other."},
          {q:"What is the CSS Box Model?",a:"Every element is a rectangular box: Content → Padding → Border → Margin. By default, width/height only applies to content (box-sizing: content-box). Use box-sizing: border-box so width/height includes padding and border — much more intuitive. Apply it globally: *, *::before, *::after { box-sizing: border-box; }"},
          {q:"What is specificity in CSS?",a:"Specificity determines which CSS rule wins when multiple rules target the same element. Hierarchy (highest to lowest): Inline styles > ID selectors (#id = 100) > Class/pseudo-class/attribute selectors (.class = 10) > Element selectors (div = 1). Use the lowest specificity that works to keep CSS maintainable."},
          {q:"What is the difference between position: relative, absolute, fixed, sticky?",a:"relative: offset from normal position, creates stacking context. absolute: positioned relative to nearest positioned ancestor, taken out of flow. fixed: positioned relative to viewport, stays during scroll. sticky: acts relative until scroll threshold, then acts fixed — useful for sticky headers."},
        ],

function useFetch(url) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    fetch(url)
      .then(r => r.json())
      .then(d => { if (!cancelled) setData(d); })
      .catch(e => { if (!cancelled) setError(e); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };  // cleanup
  }, [url]);

  return { data, loading, error };
}

// ===================== SIDEBAR =====================
function buildSidebar(filterText='') {
  const list = document.getElementById('phase-list');
  const q = filterText.toLowerCase().trim();

  if (q) {
    // search mode
    list.innerHTML = '';
    const matches = allTopics.filter(t => t.title.toLowerCase().includes(q));
    if (!matches.length) { list.innerHTML = '<div style="padding:12px 16px;font-size:.78rem;color:var(--text-muted)">No results</div>'; return; }
    matches.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'search-result-item';
      btn.innerHTML = `${t.title}<span>${t.phaseLabel}</span>`;
      btn.onclick = () => { loadTopic(t.id); document.getElementById('search-input').value=''; buildSidebar(); };
      list.appendChild(btn);
    });
    return;
  }

  list.innerHTML = '';
  ROADMAP.forEach((phase, pi) => {
    const group = document.createElement('div');
    group.className = 'phase-group';
    const btn = document.createElement('button');
    const pDone = phase.topics.filter(t => completedTopics.has(t.id)).length;
    const isOpen = pi === 0 || phase.topics.some(t => t.id === currentTopicId);
    btn.className = 'phase-btn' + (isOpen ? ' open' : '');
    btn.innerHTML = `${phase.icon} ${phase.label} <span style="font-size:.65rem;color:var(--green);font-weight:400;margin-right:auto;margin-left:6px">${pDone>0?pDone+'/'+phase.topics.length:''}</span><span class="chevron">›</span>`;
    const tl = document.createElement('div');
    tl.className = 'topic-list' + (isOpen ? ' open' : '');
    btn.onclick = () => { btn.classList.toggle('open'); tl.classList.toggle('open'); };
    phase.topics.forEach(topic => {
      const isDone = completedTopics.has(topic.id);
      const tb = document.createElement('button');
      tb.className = 'topic-btn' + (isDone ? ' done' : '') + (topic.id === currentTopicId ? ' active' : '');
      tb.id = 'tb-' + topic.id;
      tb.innerHTML = `<span class="check ${isDone?'filled':''}">✓</span>${topic.title}`;
      tb.onclick = () => loadTopic(topic.id);
      tl.appendChild(tb);
    });
    group.appendChild(btn); group.appendChild(tl); list.appendChild(group);
  });
}

function handleSearch(val) { buildSidebar(val); }

  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = done+'/'+total;
}

    <div class="phase-cards">
      ${ROADMAP.map(phase => {
        const pDone = phase.topics.filter(t=>completedTopics.has(t.id)).length;
        const pPct = Math.round((pDone/phase.topics.length)*100);
        return `<div class="phase-card" onclick="loadTopic('${phase.topics[0].id}')">
          <div class="phase-card-icon">${phase.icon}</div>
          <h3>${phase.label.replace(/Phase \d+: /,'')}</h3>
          <p>${phase.desc}</p>
          <div style="font-size:.68rem;color:var(--text-muted);margin-top:6px">${pDone}/${phase.topics.length} topics · ${pPct}%</div>
          <div class="phase-progress"><div class="phase-progress-fill" style="width:${pPct}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

// ===================== TOPIC =====================
function loadTopic(topicId) {
  const topic = allTopics.find(t=>t.id===topicId);
  if (!topic) return;
  currentTopicId = topicId;

  document.getElementById('home-view').style.display = 'none';
  document.getElementById('topic-view').style.display = 'block';
  document.getElementById('topic-title').textContent = topic.title;
  document.getElementById('topic-tag').textContent = topic.phaseLabel.replace(/Phase \d+: /,'');

  const markBtn = document.getElementById('mark-btn');
  markBtn.style.display = '';
  if (completedTopics.has(topicId)) {
    markBtn.textContent = '✓ Done'; markBtn.className = 'btn-mark done';
  } else {
    markBtn.textContent = 'Mark Complete'; markBtn.className = 'btn-mark';
  }

  const idx = allTopics.findIndex(t=>t.id===topicId);
  document.getElementById('prev-btn').disabled = idx <= 0;
  document.getElementById('next-btn').disabled = idx >= allTopics.length-1;

  buildSidebar();
  const activeBtn = document.getElementById('tb-'+topicId);
  if (activeBtn) activeBtn.scrollIntoView({block:'nearest'});

  renderTopic(topic);
  document.getElementById('content').scrollTop = 0;
}

function renderTopic(topic) {
  const savedNote = notes[topic.id] || '';
  const tv = document.getElementById('topic-view');

  tv.innerHTML = `
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'t-overview')">📖 Overview</button>
      <button class="tab-btn" onclick="switchTab(this,'t-projects')">🛠️ Projects</button>
      <button class="tab-btn" onclick="switchTab(this,'t-practices')">✅ Best Practices</button>
      <button class="tab-btn" onclick="switchTab(this,'t-qa')">💬 Interview Q&A</button>
      <button class="tab-btn" onclick="switchTab(this,'t-quiz')">🧠 Quiz</button>
      <button class="tab-btn" onclick="switchTab(this,'t-notes')">📝 Notes</button>
    </div>

    <div id="t-overview" class="tab-panel active">
      <div class="card">
        <h3>Overview</h3>
        <p>${topic.overview}</p>
      </div>
      <div class="card">
        <h3>Key Concepts</h3>
        <ul>${topic.keyConcepts.map(c=>`<li><code>${c.split(':')[0]}</code>${c.includes(':')?'&nbsp;—&nbsp;'+c.split(':').slice(1).join(':'):''}</li>`).join('')}</ul>
      </div>
      ${topic.code?`<div class="card"><h3>Code Example</h3><div class="code-block"><span class="code-lang">Code</span><pre>${escHtml(topic.code)}</pre></div></div>`:''}
    </div>

    <div id="t-projects" class="tab-panel">
      <div class="card" style="background:rgba(108,99,255,.07);border-color:rgba(108,99,255,.25)">
        <p>Build these projects to solidify your understanding and add to your portfolio. Start with beginner, work up to advanced.</p>
      </div>
      ${(topic.projects||[]).map(p=>`
        <div class="project-card">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px">
            <h4>${p.title}</h4><span class="difficulty ${p.diff}">${p.diff}</span>
          </div>
          <p>${p.desc}</p>
          <div class="tech-tags">${p.techs.map(t=>`<span class="tech-tag">${t}</span>`).join('')}</div>
        </div>`).join('')}
    </div>

    <div id="t-practices" class="tab-panel">
      <div class="card" style="background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2)">
        <p>These are real-world lessons distilled from professional experience. Apply them consistently — they separate good code from great code.</p>
      </div>
      ${(topic.bestPractices||[]).map(bp=>`
        <div class="practice-item">
          <div class="practice-icon">${bp.icon}</div>
          <div class="practice-text"><h4>${bp.title}</h4><p>${bp.desc}</p></div>
        </div>`).join('')}
    </div>

    <div id="t-qa" class="tab-panel">
      <div class="card" style="background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.2)">
        <p>Common interview questions for this topic. Click to reveal the answer. Practice saying them aloud — technical communication matters in interviews.</p>
      </div>
      ${(topic.qa||[]).map((qa,i)=>`
        <div class="qa-item">
          <div class="qa-q" onclick="toggleQa(this)">
            <span>Q${i+1}: ${qa.q}</span><span class="arr">›</span>
          </div>
          <div class="qa-a"><p>${qa.a}</p></div>
        </div>`).join('')}
    </div>

    <div id="t-quiz" class="tab-panel">
      <div class="card" style="background:rgba(108,99,255,.07);border-color:rgba(108,99,255,.25)">
        <p>Test your understanding. Select an answer for each question — the correct answer will be revealed immediately.</p>
      </div>
      <div id="quiz-body">${renderQuiz(topic)}</div>
    </div>

    <div id="t-notes" class="tab-panel">
      <div class="card" style="background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2)">
        <p>Your personal notes for this topic. Saved automatically to your browser — available next time you open this page.</p>
      </div>
      <textarea id="notes-area" placeholder="Write your notes here...
• Key things to remember
• Concepts to revisit
• Links to resources">${escHtml(savedNote)}</textarea>
      <div id="notes-save-msg" style="opacity:0"></div>
    </div>`;

  // auto-save notes
  document.getElementById('notes-area').addEventListener('input', e => {
    notes[topic.id] = e.target.value;
    localStorage.setItem('fsp-notes', JSON.stringify(notes));
    const msg = document.getElementById('notes-save-msg');
    msg.textContent = '✓ Saved'; msg.style.opacity = '1';
    clearTimeout(msg._t);
    msg._t = setTimeout(()=>{ msg.style.opacity='0'; }, 1500);
  });
}

// ===================== QUIZ =====================
function renderQuiz(topic) {
  if (!topic.quiz || !topic.quiz.length) return '<div class="card"><p style="color:var(--text-muted)">No quiz available for this topic yet.</p></div>';
  let score = 0; let answered = 0; const total = topic.quiz.length;

  return topic.quiz.map((q,qi)=>`
    <div class="quiz-q" id="qq-${qi}">
      <p>Q${qi+1}: ${q.q}</p>
      <div class="quiz-opts">
        ${q.opts.map((opt,oi)=>`
          <button class="quiz-opt" onclick="answerQuiz(${qi},${oi},${q.answer},'${topic.id}')">
            ${String.fromCharCode(65+oi)}. ${opt}
          </button>`).join('')}
      </div>
    </div>`).join('') + `<div id="quiz-score" style="display:none" class="quiz-result"><span>🎉</span><p id="quiz-score-txt"></p><br><button class="btn-retake" onclick="retakeQuiz('${topic.id}')">Retake Quiz</button></div>`;
}

let quizAnswers = {};
function answerQuiz(qi, selected, correct, topicId) {
  if (quizAnswers[topicId+'_'+qi] !== undefined) return; // already answered
  quizAnswers[topicId+'_'+qi] = selected;

  const qq = document.getElementById('qq-'+qi);
  const opts = qq.querySelectorAll('.quiz-opt');
  opts.forEach((btn,i) => {
    btn.classList.add('locked');
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && selected !== correct) btn.classList.add('wrong');
  });

  // check if all answered
  const topic = allTopics.find(t=>t.id===topicId);
  if (!topic?.quiz) return;
  const allAnswered = topic.quiz.every((_,i)=>quizAnswers[topicId+'_'+i]!==undefined);
  if (allAnswered) {
    const sc = topic.quiz.filter((_,i)=>quizAnswers[topicId+'_'+i]===topic.quiz[i].answer).length;
    const scoreEl = document.getElementById('quiz-score');
    scoreEl.style.display = 'block';
    document.getElementById('quiz-score-txt').textContent = `You scored ${sc} / ${topic.quiz.length}`;
    scoreEl.querySelector('span').textContent = sc === topic.quiz.length ? '🏆' : sc >= topic.quiz.length/2 ? '👍' : '📚';
  }
}

function retakeQuiz(topicId) {
  const topic = allTopics.find(t=>t.id===topicId);
  if (!topic) return;
  topic.quiz.forEach((_,i)=>delete quizAnswers[topicId+'_'+i]);
  document.getElementById('quiz-body').innerHTML = renderQuiz(topic);
}

// ===================== MARK COMPLETE =====================
function markTopic() {
  if (!currentTopicId) return;
  if (completedTopics.has(currentTopicId)) {
    completedTopics.delete(currentTopicId);
  } else {
    completedTopics.add(currentTopicId);
  }
  localStorage.setItem('fsp-done', JSON.stringify([...completedTopics]));
  updateProgress();
  loadTopic(currentTopicId);
}

// ===================== NAVIGATION =====================
function navigateTopic(dir) {
  const idx = allTopics.findIndex(t=>t.id===currentTopicId);
  const next = allTopics[idx+dir];
  if (next) loadTopic(next.id);
}

// ===================== HELPERS =====================
function switchTab(btn, panelId) {
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(panelId).classList.add('active');
}

function toggleQa(el) {
  el.classList.toggle('open');
  const ans = el.nextElementSibling;
  ans.style.display = ans.style.display==='block'?'none':'block';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='ArrowRight') navigateTopic(1);
  if (e.key==='ArrowLeft') navigateTopic(-1);
});

// ===================== INIT =====================
buildSidebar();
updateProgress();
loadHome();
</script>
